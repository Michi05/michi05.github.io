<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --porcelain:#EAF0F6; --card:#F8FAFD; --card-2:#FFFFFF;
    --tile-line:#CBD8E7; --tile-line-soft:#DEE7F1;
    --indigo:#122F58; --indigo-2:#2A4B7C; --muted:#5E718B;
    --cobalt:#2E63B0; --cobalt-soft:#E7EEF9;
    --confirmed:#0F7A5E; --confirmed-bg:#E0F0EA;
    --pending:#B06A12; --pending-bg:#F7EAD6;
    --interest:#2E63B0; --interest-bg:#EDF3FC;
    --clash:#B23A2E; --clash-bg:#F8E4E1;
    --choose:#5E718B;
    --shadow:0 1px 2px rgba(18,47,88,.06), 0 8px 24px rgba(18,47,88,.08);
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--porcelain);
    color:var(--indigo);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.4;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}

  /* ---------- Hero ---------- */
  header.hero{position:relative;margin-bottom:14px}
  .frieze{width:100%;height:34px;display:block;border-radius:8px 8px 0 0;opacity:.9}
  .hero-body{
    background:var(--card-2);border:1px solid var(--tile-line);border-top:none;
    border-radius:0 0 12px 12px;padding:16px 20px;display:flex;flex-wrap:wrap;
    align-items:flex-end;justify-content:space-between;gap:14px;box-shadow:var(--shadow);position:relative}
  .hero h1{
    font-family:"Archivo",sans-serif;font-weight:800;font-size:clamp(24px,4vw,38px);
    letter-spacing:.12em;text-transform:uppercase;margin:0;line-height:1;color:var(--indigo)}
  .hero .sub{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--muted);margin-top:8px;letter-spacing:.03em}
  .hero .sub b{color:var(--indigo-2);font-weight:600}
  .swatch{width:9px;height:9px;border-radius:2px;display:inline-block}
  .sw-confirmed{background:var(--confirmed)} .sw-pending{background:var(--pending)} .sw-interest{background:var(--interest)}

  /* ---------- Action banner ---------- */
  .action{
    display:flex;gap:12px;align-items:flex-start;
    background:var(--clash-bg);border:1px solid #E3B7B0;border-left:4px solid var(--clash);
    border-radius:var(--radius);padding:12px 14px;margin:14px 0}
  .action .ico{font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--clash);font-size:13px;line-height:1.6;flex:none}
  .action h2{font-family:"Archivo",sans-serif;font-size:14px;margin:0 0 4px;letter-spacing:.02em;color:#7d2b21}
  .action ul{margin:0;padding-left:0;list-style:none;display:flex;flex-wrap:wrap;gap:6px 18px}
  .action li{font-size:13px;color:#5c2620}
  .action li time{font-family:"IBM Plex Mono",monospace;font-weight:600;color:var(--clash)}
  .action button.x{margin-left:auto;background:none;border:none;color:#7d2b21;font-size:18px;cursor:pointer;line-height:1;padding:2px 4px}

  /* ---------- Controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;margin:14px 0 6px}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--tile-line);border-radius:999px;padding:3px}
  .seg button{
    font-family:"Inter";font-size:13px;font-weight:600;color:var(--muted);
    border:none;background:none;padding:6px 14px;border-radius:999px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--indigo);color:#fff}
  .filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;flex:1}
  .fbtn{
    font-family:"Inter";font-size:12.5px;font-weight:600;cursor:pointer;
    border:1px solid var(--tile-line);background:var(--card);color:var(--muted);
    padding:6px 11px;border-radius:999px;display:flex;align-items:center;gap:7px;flex:1;justify-content:center}
  .fbtn[aria-pressed="true"]{color:var(--indigo);background:#fff;border-color:var(--indigo-2)}
  .fbtn[aria-pressed="false"]{opacity:.55;text-decoration:line-through}
  .fbtn .swatch{border-radius:3px}
  .fbtn-count{
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:700;
    background:var(--cobalt-soft);color:var(--cobalt);border-radius:999px;
    padding:1px 7px;margin-left:4px}
  .toggle{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--cobalt);width:15px;height:15px}

  /* ---------- Legend ---------- */
  .legend{position:absolute;bottom:12px;right:16px;display:inline-block;margin:0}
  .legend-btn{
    width:22px;height:22px;border-radius:50%;border:1.5px solid var(--cobalt);
    background:var(--cobalt-soft);color:var(--cobalt);font-family:"IBM Plex Mono",monospace;
    font-size:12px;font-weight:700;cursor:help;display:flex;align-items:center;justify-content:center;
    line-height:1;padding:0}
  .legend-pop{
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:var(--card-2);border:1px solid var(--tile-line);border-radius:8px;
    padding:10px 14px;box-shadow:var(--shadow);white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .15s;z-index:30;
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);letter-spacing:.02em}
  .legend-pop::before{
    content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-bottom-color:var(--tile-line)}
  .legend-pop::after{
    content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-bottom-color:var(--card-2)}
  .legend-btn:hover+.legend-pop,.legend-btn:focus+.legend-pop{opacity:1;pointer-events:auto}
  .legend-pop div{display:flex;align-items:center;gap:8px;padding:3px 0}
  .legend-pop div+div{border-top:1px solid var(--tile-line-soft)}
  .lg-clash{color:var(--clash);font-weight:700}
  .lg-choose{color:var(--choose);font-weight:700}

  /* ---------- Calendar grid ---------- */
  .weekday-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .weekday-head div{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0}
  .weekday-head .we{color:#B22222}
  .week{margin-bottom:6px}
  .lane{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .lane:empty{display:none}
  .span-bar{
    border-radius:8px;padding:7px 10px;cursor:pointer;border:1.5px solid var(--interest);
    background:var(--interest-bg);color:var(--indigo);display:flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:600;box-shadow:var(--shadow);text-align:left}
  .span-bar .tag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--interest);flex:none}
  .span-bar .opt{border-style:dashed;opacity:.75}
  /* per-day continuation tiles for multi-day spans */
  .span-day{border-radius:0;border-left:none;border-right:none;padding:7px 8px;gap:5px;
    font-size:11.5px;white-space:nowrap;overflow:hidden;min-width:0}
  .span-day .tag{font-size:9px}
  .span-day .sp-ttl{overflow:hidden;text-overflow:ellipsis}
  .span-start{border-left:1.5px solid var(--interest);border-top-left-radius:8px;border-bottom-left-radius:8px}
  .span-end{border-right:1.5px solid var(--interest);border-top-right-radius:8px;border-bottom-right-radius:8px}
  .span-cont .sp-ttl{color:var(--indigo-2)}
  .span-cont .lead{color:var(--interest);font-weight:700;margin-right:2px}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;align-items:stretch}
  .day{
    background:var(--card-2);border:1px solid var(--tile-line);border-radius:var(--radius);
    min-height:118px;padding:7px 7px 8px;display:flex;flex-direction:column;gap:5px;position:relative}
  .day.oob{background:repeating-linear-gradient(135deg,#eef2f7,#eef2f7 6px,#e9eef5 6px,#e9eef5 12px);border-style:dashed;opacity:.7}
  .day.past{opacity:.62}
  .day.today{border-color:var(--cobalt);box-shadow:0 0 0 2px var(--cobalt-soft)}
  .day-head{display:flex;align-items:center;justify-content:space-between;gap:4px}
  .dnum{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:13px;color:var(--indigo-2)}
  .dnum .mo{font-size:10px;color:var(--muted);margin-left:3px}
  .today .dnum{color:var(--cobalt)}
  .weekend .dnum{color:#B22222}
  .todaytag{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:700;color:#fff;background:var(--cobalt);
    border-radius:999px;padding:2px 6px;letter-spacing:.05em}
  .badge{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:700;border-radius:999px;
    padding:2px 7px;cursor:pointer;border:none}
  .badge.clash{background:var(--clash-bg);color:var(--clash)}
  .badge.choose{background:#E7ECF2;color:var(--choose)}

  /* event chips */
  .chip{
    text-align:left;width:100%;border:none;cursor:pointer;border-radius:7px;
    padding:5px 7px;display:flex;flex-direction:column;gap:2px;font-family:"Inter";
    border-left:3px solid transparent;position:relative;background:#fff}
  .chip:focus-visible,.badge:focus-visible,.span-bar:focus-visible,.chip-clash-mk:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px}
  .chip .top{display:flex;align-items:center;gap:6px}
  .chip .tag{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;letter-spacing:.05em;flex:none}
  .chip .time{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);margin-left:auto;flex:none}
  .chip .ttl{font-size:12px;font-weight:600;line-height:1.2;color:var(--indigo)}
  .chip.cancelled .ttl{text-decoration:line-through}
  .chip.confirmed{background:var(--confirmed-bg);border-left-color:var(--confirmed)}
  .chip.confirmed .tag{color:var(--confirmed)}
  .chip.pending{background:var(--pending-bg);border-left-color:var(--pending)}
  .chip.pending .tag{color:var(--pending)}
  .chip.interest{background:var(--interest-bg);border:1px dashed var(--interest);border-left:3px solid var(--interest)}
  .chip.interest .tag{color:var(--interest)}
  .chip.checkout{background:#FBEEE9;border:1px solid #E9C6BF;border-left:3px solid #C2564A}
  .chip.checkout .tag{color:#B23A2E}
  .chip.checkout .ttl{color:#7d2b21}
  .chip.chore{background:#EAEEF3;border:1px solid var(--tile-line-soft);border-left:none;border-radius:6px;
    padding:4px 8px;flex-direction:row;align-items:center;gap:7px;box-shadow:none}
  .chip.chore .ch-emoji{font-size:12px;line-height:1;flex:none}
  .chip.chore .ch-body{display:flex;flex-direction:column;gap:1px;min-width:0}
  .chip.chore .ch-label{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;color:var(--muted);
    letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip.chore .ch-cities{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:500;color:#8797ab;
    letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip.chore.social{background:var(--interest-bg);border-color:#D4E1F4}
  .chip.chore.social .ch-label{color:var(--interest)}
  .chip.allday{background-image:linear-gradient(90deg,rgba(255,255,255,.45),transparent);}
  .chip.allday .ttl::before{content:"▬ ";opacity:.5;font-size:9px;vertical-align:middle}
  .chip.short{padding:4px 7px}
  .chip.short .ttl{font-weight:500}
  .chip .mk{position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;font-family:"IBM Plex Mono",monospace;line-height:1;pointer-events:none}
  .chip.has-clash{box-shadow:inset 0 0 0 1.5px var(--clash)}
  .chip.has-choose{box-shadow:inset 0 0 0 1px var(--choose)}
  .chip.dim{opacity:.28;filter:grayscale(.4)}

  /* ---------- Agenda ---------- */
  .agenda{display:none;flex-direction:column;gap:2px}
  .agenda.on{display:flex}
  .calendar.off{display:none}
  .ag-day{border-bottom:1px solid var(--tile-line-soft);padding:10px 2px}
  .ag-day.today .ag-date{color:var(--cobalt)}
  .ag-date{font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:600;color:var(--indigo-2);
    display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .ag-date .wd{color:var(--muted);font-weight:500}
  .ag-list{display:flex;flex-direction:column;gap:6px}
  .ag-empty{font-size:12px;color:var(--muted);font-style:italic;padding-left:2px}

  /* ---------- Unscheduled ---------- */
  .unsched{margin:14px auto;background:var(--card);border:1px dashed var(--tile-line);border-radius:12px;padding:14px 16px;width:85%}
  .unsched-head{
    width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
    background:none;border:none;cursor:pointer;padding:0;text-align:center}
  .unsched-head h3{font-family:"Archivo";font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin:0;color:var(--indigo-2)}
  .unsched-count{
    font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:700;
    background:var(--cobalt-soft);color:var(--cobalt);border-radius:999px;
    padding:2px 8px;margin-left:8px;vertical-align:middle}
  .unsched-arrow{
    font-size:14px;color:var(--muted);transition:transform .2s}
  .unsched:not(.collapsed) .unsched-arrow{transform:rotate(180deg)}
  .unsched-body{overflow:hidden;max-height:400px;transition:max-height .25s ease,opacity .2s,padding .25s;opacity:1;padding-top:10px}
  .unsched.collapsed .unsched-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0}
  .unsched p.hint{font-size:12px;color:var(--muted);margin:0 0 10px}
  .unsched .row{display:flex;flex-wrap:wrap;gap:8px}

  /* ---------- Drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(18,47,88,.34);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(400px,92vw);background:var(--card-2);
    box-shadow:-10px 0 40px rgba(18,47,88,.22);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);
    z-index:50;display:flex;flex-direction:column;border-left:1px solid var(--tile-line)}
  .drawer.on{transform:translateX(0)}
  .dr-head{padding:16px 18px 14px;border-bottom:1px solid var(--tile-line-soft);position:relative}
  .dr-status{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.05em;
    display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px}
  .dr-status.confirmed{background:var(--confirmed-bg);color:var(--confirmed)}
  .dr-status.pending{background:var(--pending-bg);color:var(--pending)}
  .dr-status.interest{background:var(--interest-bg);color:var(--interest)}
  .dr-status.chore{background:var(--card);color:var(--muted);border:1px solid var(--tile-line)}
  .dr-head h2{font-family:"Archivo";font-size:20px;font-weight:700;margin:12px 0 3px;line-height:1.15}
  .dr-head .org{font-size:12.5px;color:var(--muted)}
  .dr-close{position:absolute;top:12px;right:12px;background:var(--card);border:1px solid var(--tile-line);
    width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted);line-height:1}
  .dr-body{padding:16px 18px 30px;overflow-y:auto}
  .meta{display:grid;grid-template-columns:74px 1fr;gap:9px 12px;margin-bottom:16px;font-size:13.5px}
  .meta dt{font-family:"IBM Plex Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);padding-top:2px}
  .meta dd{margin:0;color:var(--indigo)}
  .meta dd .len{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);
    border:1px solid var(--tile-line);border-radius:5px;padding:1px 6px;margin-left:6px}
  .dr-note{font-size:13.5px;color:var(--indigo-2);background:var(--card);border-radius:8px;padding:11px 12px;margin-bottom:14px}
  .dr-section-t{font-family:"IBM Plex Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);margin:0 0 7px}
  .opts{list-style:none;margin:0 0 14px;padding:0;display:flex;flex-direction:column;gap:5px}
  .opts li{font-size:13px;font-family:"IBM Plex Mono",monospace;background:var(--card);border-radius:6px;padding:6px 9px;color:var(--indigo-2)}
  .clashbox{border-radius:8px;padding:11px 12px;margin-bottom:14px;font-size:13px}
  .clashbox.clash{background:var(--clash-bg);border:1px solid #E3B7B0}
  .clashbox.choose{background:#EEF1F5;border:1px solid var(--tile-line)}
  .clashbox b{display:block;margin-bottom:5px}
  .clashbox.clash b{color:var(--clash)} .clashbox.choose b{color:var(--choose)}
  .clashbox button{display:block;background:none;border:none;text-align:left;cursor:pointer;font-size:13px;
    color:var(--indigo);padding:3px 0;text-decoration:underline;text-decoration-color:var(--tile-line)}
  .dr-deadline{background:#FBEEE9;border:1px solid #E3B7B0;color:#7d2b21;border-radius:8px;padding:9px 12px;
    font-size:13px;margin-bottom:14px;display:flex;gap:8px;align-items:center}
  .dr-deadline b{font-family:"IBM Plex Mono",monospace}
  .dr-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;
    background:var(--cobalt);border-radius:8px;padding:9px 14px;text-decoration:none}
  .dr-link:hover{background:var(--indigo-2)}

  footer{margin-top:28px;font-size:11.5px;color:var(--muted);font-family:"IBM Plex Mono",monospace;
    border-top:1px solid var(--tile-line-soft);padding-top:12px;letter-spacing:.02em}

  @media (max-width:820px){
    .seg.viewseg{order:-1}
  }
  @media (prefers-reduced-motion:reduce){
    .drawer,.scrim,.unsched-body,.unsched-arrow,.legend-pop{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <svg class="frieze" viewBox="0 0 600 34" preserveAspectRatio="xMidYMid slice" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="azulejo" width="34" height="34" patternUnits="userSpaceOnUse">
          <rect width="34" height="34" fill="#EAF0F6"/>
          <g fill="none" stroke="#2E63B0" stroke-width="1.4">
            <path d="M17 3 C24 8 26 12 31 17 C26 22 24 26 17 31 C10 26 8 22 3 17 C8 12 10 8 17 3 Z"/>
            <circle cx="17" cy="17" r="4.2" stroke="#122F58"/>
            <path d="M17 0 L17 5 M17 29 L17 34 M0 17 L5 17 M29 17 L34 17" stroke="#122F58" stroke-width="1"/>
          </g>
        </pattern>
      </defs>
      <rect width="600" height="34" fill="url(#azulejo)"/>
    </svg>
    <div class="hero-body">
      <div>
        <h1>Porto Chapter</h1>
        <div class="sub">Last updated on <b>10 Jul 2026</b> · Tap any tile for details</div>
      </div>
      <div class="legend" aria-label="Legend">
        <button class="legend-btn" aria-label="Show legend" tabindex="0">i</button>
        <div class="legend-pop" role="tooltip">
          <div><span class="lg-clash">⚠</span> Hard clash — same day &amp; time</div>
          <div><span class="lg-choose">◇</span> Competing options — pick one</div>
        </div>
      </div>
    </div>
  </header>

  <section class="unsched collapsed" id="unsched">
    <button class="unsched-head" id="unschedToggle" aria-expanded="false">

/* ============ Clash detection ============ */
/* occupancy slots per event: fullday=[m,a], part/short by daypart. noSlot -> none (undecided) */
function slots(ev){
  if(ev.noSlot) return [];
  if(ev.len==="fullday") return ["m","a"];
  const p=partOf(ev);
  if(p==="morning") return ["m"];
  if(p==="afternoon") return ["a"];
  if(p==="evening") return ["e"];
  return [];
}
const clashMap={}; // id -> [{id, level}]
(function computeClashes(){
  const byDate={};
  EVENTS.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  Object.values(byDate).forEach(list=>{
    for(let i=0;i<list.length;i++)for(let j=i+1;j<list.length;j++){
      const a=list[i],b=list[j];
      const sa=slots(a),sb=slots(b);
      if(sa.some(s=>sb.includes(s))){
        const level="choose";
        (clashMap[a.id]=clashMap[a.id]||[]).push({id:b.id,level});
        (clashMap[b.id]=clashMap[b.id]||[]).push({id:a.id,level});
      }
    }
  });
})();
function dayClashLevel(dateEvents){
  let lvl=null;
  dateEvents.forEach(e=>{ (clashMap[e.id]||[]).forEach(c=>{ if(dateEvents.find(x=>x.id===c.id)){ if(c.level==="clash")lvl="clash"; else if(!lvl)lvl="choose"; } }); });
  return lvl;
}

function chipEl(ev){

  if(!visible(ev)) b.classList.add("dim");
  const cl=clashMap[ev.id]||[];
  const hard=cl.some(c=>c.level==="clash"), soft=cl.some(c=>c.level==="choose");
  if(hard) b.classList.add("has-clash"); else if(soft) b.classList.add("has-choose");
  const timeTxt = ev.noSlot?"poll":(ev.len==="fullday")?"all day":(ev.end?`${fmtTime(ev.start)}`:fmtTime(ev.start));
  b.innerHTML=`<div class="top"><span class="tag">${ev.tag}</span><span class="time">${timeTxt}</span></div>
    <div class="ttl">${ev.title}</div>${hard?'<span class="mk" style="color:var(--clash)">⚠</span>':soft?'<span class="mk" style="color:var(--choose)">◇</span>':''}`;
  b.addEventListener("click",()=>openDrawer(ev.id));
  return b;
}

  b.className=`chip chore ${hk.kind}`;
  b.innerHTML=`<span class="ch-emoji">${m.emoji}</span><span class="ch-body"><span class="ch-label">${m.label}</span><span class="ch-cities">${cities}</span></span>`;
  b.addEventListener("click",()=>openHousekeeping(hk.id));
  return b;
}

/* other weekly recurring markers (title + emoji only; time details in the drawer) */
const RECURRING=[
  { id:"tribal-tue", emoji:"🥳", label:"Tribal Tuesday", weekday:2,
    note:"WiFi Tribe's weekly Tribal Tuesday get-together. Usually around midday, but the time flexes to fit whoever's around — keep an eye on the channel for the call." },
];
const recById={}; RECURRING.forEach(r=>recById[r.id]=r);
function recChipEl(r){
  const b=document.createElement("button");
  b.className="chip chore social";
  b.innerHTML=`<span class="ch-emoji">${r.emoji}</span><span class="ch-body"><span class="ch-label">${r.label}</span></span>`;
  b.addEventListener("click",()=>openRecurring(r.id));
  return b;
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  // weekday header
  const head=document.getElementById("weekdayHead");
  head.innerHTML="";
  ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach((w,i)=>{ const c=document.createElement("div"); c.textContent=w; if(i>=5)c.className="we"; head.appendChild(c); });

  weeks.forEach(row=>{
    const wk=document.createElement("div"); wk.className="week";

    const days=document.createElement("div"); days.className="days";
    row.forEach(dt=>{
      const key=iso(dt);
      const cell=document.createElement("div"); cell.className="day";
      const inJuly = dt.getUTCMonth()===6;
      if(!inJuly) cell.classList.add("oob");
      const isPast = key<TODAY;
      const isToday = key===TODAY;
      const isWeekend = dt.getUTCDay()===0 || dt.getUTCDay()===6;
      if(isPast) cell.classList.add("past");
      if(isToday) cell.classList.add("today");
      if(isWeekend) cell.classList.add("weekend");
      if(isPast && !state.showPast) cell.style.visibility="hidden";

      const dayEvents=EVENTS.filter(e=>e.date===key).sort((a,b)=>{
        const o={fullday:0,part:1,short:2}; if(o[a.len]!==o[b.len]) return o[a.len]-o[b.len];
        return (a.start||"99:99").localeCompare(b.start||"99:99");
      });
      const shownEvents=dayEvents.filter(visible);
      const lvl=dayClashLevel(shownEvents);

      const dh=document.createElement("div"); dh.className="day-head";
      const dn=dt.getUTCDate();
      dh.innerHTML=`<span class="dnum">${dn}${dn===1?`<span class="mo">${MO[dt.getUTCMonth()]}</span>`:""}</span>`;
      if(isToday){ const t=document.createElement("span"); t.className="todaytag"; t.textContent="TODAY"; dh.appendChild(t); }
      else if(lvl){ const bd=document.createElement("button"); bd.className=`badge ${lvl}`;
        const n=shownEvents.length;
        bd.textContent = lvl==="clash"?`⚠ clash`:`◇ ${n} options`;
        bd.title = lvl==="clash"?"Hard clash on this day":"Competing options — pick one";
        bd.addEventListener("click",()=>openDayDrawer(key,shownEvents,lvl));
        dh.appendChild(bd);
      }
      cell.appendChild(dh);
      // multi-day spans render as a chip inside each day they cover
      SPANS.filter(sp=>visible(sp) && key>=sp.startDate && key<=sp.endDate)
        .forEach(sp=>cell.appendChild(spanChipEl(sp,key)));
      shownEvents.forEach(ev=>cell.appendChild(chipEl(ev)));
      // recurring weekly markers (social first, then housekeeping) for this weekday
      RECURRING.filter(r=>r.weekday===dt.getUTCDay()).forEach(r=>cell.appendChild(recChipEl(r)));
      HOUSEKEEPING.filter(hk=>hk.weekday===dt.getUTCDay()).forEach(hk=>cell.appendChild(choreChipEl(hk)));
      days.appendChild(cell);
    });
    wk.appendChild(days);
    cal.appendChild(wk);
  });
}

function renderAgenda(){
  const ag=document.getElementById("agenda"); ag.innerHTML="";
  const all=[];
  weeks.flat().forEach(dt=>{ const key=iso(dt); if(key<TODAY && !state.showPast) return;
    all.push({date:key,dt}); });
  all.forEach(({date,dt})=>{
    const dayEvents=EVENTS.filter(e=>e.date===date && visible(e)).sort((a,b)=>(a.start||"99").localeCompare(b.start||"99"));
    // include span if starts within
    const spanHere=SPANS.filter(sp=>sp.startDate===date && visible(sp));
    const choresHere=HOUSEKEEPING.filter(hk=>hk.weekday===dt.getUTCDay());
    const recHere=RECURRING.filter(r=>r.weekday===dt.getUTCDay());
    if(!dayEvents.length && !spanHere.length && !choresHere.length && !recHere.length && date!==TODAY) return;
    const box=document.createElement("div"); box.className="ag-day"+(date===TODAY?" today":"");
    const lvl=dayClashLevel(dayEvents);
    box.innerHTML=`<div class="ag-date"><span>${WDFULL[dt.getUTCDay()]}</span><span class="wd">${dt.getUTCDate()} ${MO[dt.getUTCMonth()]}</span>${date===TODAY?'<span class="todaytag">TODAY</span>':""}${lvl?`<span class="badge ${lvl}">${lvl==="clash"?"⚠ clash":"◇ options"}</span>`:""}</div>`;
    const list=document.createElement("div"); list.className="ag-list";
    spanHere.forEach(sp=>{ const b=document.createElement("button"); b.className="span-bar"; b.innerHTML=`<span class="tag">${sp.tag}</span> ${sp.title} · 24–26 Jul (2–3 nights)`; b.addEventListener("click",()=>openDrawer(sp.id)); list.appendChild(b); });
    if(!dayEvents.length && !spanHere.length && !choresHere.length && !recHere.length){ const e=document.createElement("div"); e.className="ag-empty"; e.textContent="Nothing planned yet."; list.appendChild(e);}
    dayEvents.forEach(ev=>list.appendChild(chipEl(ev)));
    recHere.forEach(r=>list.appendChild(recChipEl(r)));
    choresHere.forEach(hk=>list.appendChild(choreChipEl(hk)));
    box.appendChild(list); ag.appendChild(box);
  });
}

function render(){ renderCalendar(); renderAgenda(); }

/* ============ Drawer ============ */
const drawer=document.getElementById("drawer"), scrim=document.getElementById("scrim");
let lastFocus=null;
function openDrawer(id){
  const ev=byId[id]; if(!ev) return;
  lastFocus=document.activeElement;
  document.getElementById("drStatus").className="dr-status "+ev.status;
  document.getElementById("drStatus").textContent=ev.cancelled?"● Cancelled":{confirmed:"● Confirmed",pending:"● Pending confirmation",interest:"● Interest / placeholder"}[ev.status];
  document.getElementById("drTitle").textContent=ev.title;
  document.getElementById("drTitle").style.textDecoration=ev.cancelled?"line-through":"";
  document.getElementById("drOrg").textContent="Posted by "+ev.org;

  const rows=[];
  const isSpan=!!ev.startDate;
  if(isSpan){
    rows.push(["When", `Fri 24 – Sun 26 Jul 2026 <span class="len">multi-day</span>`]);
  } else if(ev.date){
    const dt=d(ev.date);
    let when=`${WDFULL[dt.getUTCDay()]} ${dt.getUTCDate()} ${MO[dt.getUTCMonth()]}`;
    const p=partOf(ev);
    if(ev.noSlot) when+= ` <span class="len">time TBD · poll</span>`;
    else if(ev.len==="fullday") when+=` <span class="len">all day</span>`;
    else if(ev.end) when+=` · ${fmtTime(ev.start)}–${fmtTime(ev.end)} <span class="len">${partLabel(p)}</span>`;
    else if(ev.start) when+=` · ${fmtTime(ev.start)} <span class="len">${ev.len==="short"?"short":partLabel(p)}</span>`;
    rows.push(["When",when]);
  }
  if(ev.loc) rows.push(["Where",ev.loc]);
  if(ev.price) rows.push(["Cost",ev.price]);

  let html=`<dl class="meta">${rows.map(r=>`<dt>${r[0]}</dt><dd>${r[1]}</dd>`).join("")}</dl>`;

  if(ev.deadline){
    const dd=d(ev.deadline.date); const today=ev.deadline.date===TODAY;
    html+=`<div class="dr-deadline"><span>⏰</span><div><b>Reply by ${fmtTime(ev.deadline.time)}, ${WD[dd.getUTCDay()]} ${dd.getUTCDate()} ${MO[dd.getUTCMonth()]}${today?" — that's today":""}.</b><br>${ev.deadline.text}.</div></div>`;
  }

  if(ev.note) html+=`<div class="dr-note">${ev.note}</div>`;

  if(ev.options){
    html+=`<p class="dr-section-t">Options on the table</p><ul class="opts">${ev.options.map(o=>`<li>${o}</li>`).join("")}</ul>`;
  }

  const cl=clashMap[ev.id]||[];
  if(cl.length){
    const hard=cl.filter(c=>c.level==="clash"), soft=cl.filter(c=>c.level==="choose");
    if(hard.length){
      html+=`<div class="clashbox clash"><b>⚠ Hard clash — same day & time block</b>${hard.map(c=>`<button data-goto="${c.id}">${byId[c.id].title} →</button>`).join("")}</div>`;
    }
    if(soft.length){
      html+=`<div class="clashbox choose"><b>◇ Competing option — you can only do one</b>${soft.map(c=>`<button data-goto="${c.id}">${byId[c.id].title} →</button>`).join("")}</div>`;
    }
  }

  if(ev.link) html+=`<a class="dr-link" href="${ev.link.url}" target="_blank" rel="noopener">Open ${ev.link.label} ↗</a>`;

  const body=document.getElementById("drBody"); body.innerHTML=html;
  body.querySelectorAll("[data-goto]").forEach(bn=>bn.addEventListener("click",()=>openDrawer(bn.dataset.goto)));

  drawer.classList.add("on"); scrim.classList.add("on"); drawer.setAttribute("aria-hidden","false");
  document.getElementById("drClose").focus();
}

function openDayDrawer(dateKey,events,lvl){
  const dt=d(dateKey);
  lastFocus=document.activeElement;
  document.getElementById("drStatus").className="dr-status "+(lvl==="clash"?"pending":"interest");
  document.getElementById("drStatus").textContent = lvl==="clash"?"⚠ Hard clash":"◇ Competing options";
  document.getElementById("drTitle").textContent=`${WDFULL[dt.getUTCDay()]} ${dt.getUTCDate()} ${MO[dt.getUTCMonth()]}`;
  document.getElementById("drOrg").textContent=`${events.length} activities compete for this day`;
  const groups={morning:[],afternoon:[],evening:[],day:[],other:[]};
  events.forEach(e=>{ const p=e.noSlot?"other":(partOf(e)||"other"); (groups[p]||groups.other).push(e); });
  let html=`<div class="dr-note">Tiles below overlap in time. ${lvl==="clash"?"At least one is confirmed or pending — sort out the collision.":"These are competing interest posts — the group needs to pick."}</div>`;
  [["day","All day"],["morning","Morning"],["afternoon","Afternoon"],["evening","Evening"],["other","Time TBD"]].forEach(([k,lab])=>{
    if(groups[k].length){ html+=`<p class="dr-section-t">${lab}</p>`;
      groups[k].forEach(e=>{ html+=`<button class="chip ${e.status} ${e.len==='fullday'?'allday':''} ${e.cancelled?'cancelled':''}" data-goto="${e.id}" style="margin-bottom:6px"><div class="top"><span class="tag">${e.tag}</span><span class="time">${e.noSlot?'poll':e.len==='fullday'?'all day':fmtTime(e.start)}</span></div><div class="ttl">${e.title}</div></button>`; });
    }
  });
  const body=document.getElementById("drBody"); body.innerHTML=html;
  body.querySelectorAll("[data-goto]").forEach(bn=>bn.addEventListener("click",()=>openDrawer(bn.dataset.goto)));
  drawer.classList.add("on"); scrim.classList.add("on"); drawer.setAttribute("aria-hidden","false");
  document.getElementById("drClose").focus();
}

function openHousekeeping(id){
  const hk=hkById[id]; if(!hk) return;
  lastFocus=document.activeElement;
  document.getElementById("drStatus").className="dr-status chore";
  document.getElementById("drStatus").textContent="● Housekeeping";
  document.getElementById("drTitle").textContent=hk.type;
  document.getElementById("drOrg").textContent=`Every ${WDFULL[hk.weekday]} during the stay`;
  let html=`<div class="dr-note">Recurring apartment housekeeping — same slot each week. Times are per apartment.</div>`;
  html+=`<p class="dr-section-t">By apartment</p><ul class="opts">`;
  hk.apts.forEach(a=>{ html+=`<li><b>${a.name}</b> — ${a.loc} · ${a.time}</li>`; });
  html+=`</ul>`;
  const body=document.getElementById("drBody"); body.innerHTML=html;
  drawer.classList.add("on"); scrim.classList.add("on"); drawer.setAttribute("aria-hidden","false");
  document.getElementById("drClose").focus();
}

function openRecurring(id){
  const r=recById[id]; if(!r) return;
  lastFocus=document.activeElement;
  document.getElementById("drStatus").className="dr-status chore";
  document.getElementById("drStatus").textContent="● Weekly";
  document.getElementById("drTitle").textContent=r.label;
  document.getElementById("drOrg").textContent=`Every ${WDFULL[r.weekday]}`;
  document.getElementById("drBody").innerHTML=`<div class="dr-note">${r.note}</div>`;
  drawer.classList.add("on"); scrim.classList.add("on"); drawer.setAttribute("aria-hidden","false");
  document.getElementById("drClose").focus();
}

function closeDrawer(){ drawer.classList.remove("on"); scrim.classList.remove("on"); drawer.setAttribute("aria-hidden","true"); if(lastFocus)lastFocus.focus(); }
document.getElementById("drClose").addEventListener("click",closeDrawer);
scrim.addEventListener("click",closeDrawer);
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&drawer.classList.contains("on"))closeDrawer(); });

/* ============ Tally, deadlines, floating, footer ============ */
function buildTally(){
  const counts={confirmed:0,pending:0,interest:0};
  EVENTS.concat(SPANS).forEach(e=>{ if(e.kind==="checkout") return; counts[e.status]++; });
  Object.keys(counts).forEach(k=>{
    const el=document.getElementById("count-"+k);
    if(el) el.textContent=counts[k];
  });
}
function buildFloating(){
  document.getElementById("unschedRow").innerHTML="";
  FLOATING.forEach(ev=>{ const b=chipEl(ev); b.style.maxWidth="260px"; document.getElementById("unschedRow").appendChild(b); });
  document.getElementById("unschedCount").textContent = FLOATING.length;
}
document.getElementById("footer").innerHTML=
  "Reconstructed from the #porto Slack thread. Confirmed = booked/decided · Pending = binding post awaiting cut-off · Interest = poll or idea. Verify times against the channel before you commit money."+
  "<br>group calendar · <b>Mon 6 Jul – Sun 2 Aug 2026</b> · 4 weeks";

/* ============ Wire up controls ============ */
document.getElementById("viewCal").addEventListener("click",()=>setView("calendar"));
document.getElementById("viewAgd").addEventListener("click",()=>setView("agenda"));
function setView(v){
  state.view=v;
  document.getElementById("viewCal").setAttribute("aria-pressed",v==="calendar");
  document.getElementById("viewAgd").setAttribute("aria-pressed",v==="agenda");
  document.getElementById("calendar").classList.toggle("off",v!=="calendar");
  document.getElementById("weekdayHead").style.display = v==="calendar"?"grid":"none";
  document.getElementById("agenda").classList.toggle("on",v==="agenda");
}
document.querySelectorAll("#statusFilters .fbtn").forEach(btn=>{
  btn.addEventListener("click",()=>{ const s=btn.dataset.status; state.statuses[s]=!state.statuses[s];
    btn.setAttribute("aria-pressed",state.statuses[s]); render(); });
});
document.getElementById("showPast").addEventListener("change",e=>{ state.showPast=e.target.checked; render(); });

document.getElementById("unschedToggle").addEventListener("click",()=>{
  const sec=document.getElementById("unsched");
  const open=!sec.classList.contains("collapsed");
  sec.classList.toggle("collapsed");
  document.getElementById("unschedToggle").setAttribute("aria-expanded",!open);
});

/* ============ Init ============ */
buildTally(); buildFloating(); render();
if(window.innerWidth<820) setView("agenda");
</script>
</body>
